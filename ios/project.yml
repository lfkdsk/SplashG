name: SplashG
options:
  bundleIdPrefix: org.lfkdsk
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: 5.1.0
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: 8.1.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  SplashG:
    type: application
    platform: iOS
    sources:
      - path: SplashG
    dependencies:
      - package: Yams
      - package: Kingfisher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.lfkdsk.splashg
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: SplashG/Info.plist
      properties:
        CFBundleDisplayName: SplashG
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: org.lfkdsk.splashg.oauth
            CFBundleURLSchemes:
              - splashg
        NSPhotoLibraryAddUsageDescription: "SplashG saves downloaded photos to your photo library."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
