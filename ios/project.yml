name: SplashG
options:
  bundleIdPrefix: org.lfkdsk
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: 5.1.0
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: 8.1.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: R6QM7B7GB7
    CODE_SIGN_STYLE: Automatic

# Shared scheme — required by Xcode Cloud (user-auto-created schemes
# aren't checked into the generated project).
schemes:
  SplashG:
    build:
      targets:
        SplashG: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  SplashG:
    type: application
    platform: iOS
    sources:
      - path: SplashG
    dependencies:
      - package: Yams
      - package: Kingfisher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.lfkdsk.splashg
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: SplashG/Info.plist
      properties:
        CFBundleDisplayName: SplashG
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Portrait-only apps must declare full-screen, otherwise App Store
        # validation warns about missing orientations.
        UIRequiresFullScreen: true
        CFBundleURLTypes:
          - CFBundleURLName: org.lfkdsk.splashg.oauth
            CFBundleURLSchemes:
              - splashg
        NSPhotoLibraryAddUsageDescription: "SplashG saves downloaded photos to your photo library."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # Standard HTTPS only — exempt from export compliance, skips the
        # per-build encryption question on App Store Connect.
        ITSAppUsesNonExemptEncryption: false
